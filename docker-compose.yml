services:
  postgres:
    image: postgres:16-alpine
    container_name: testblossom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rickandmorty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rickandmorty"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      app_network:
        ipv4_address: 172.28.0.10

  redis:
    image: redis:7-alpine
    container_name: testblossom-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      app_network:
        ipv4_address: 172.28.0.11

  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: testblossom-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 4000
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rickandmorty
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSL: "false"
      REDIS_URL: redis://redis:6379
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "4001:4000"
    networks:
      app_network:
        ipv4_address: 172.28.0.20

  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
      args:
        VITE_GRAPHQL_URL: http://localhost:4001/graphql
    container_name: testblossom-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "8080:8080"
    networks:
      app_network:
        ipv4_address: 172.28.0.30

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
